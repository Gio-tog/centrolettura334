<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Lettura - Catalogo Libri</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Design personalizzato ed elegante per il Catalogo */
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #1e40af;
            --primary-hover: #1e3a8a;
            --accent: #f59e0b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.03em;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Sezione Statistiche */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: -30px;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-card h3 {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Vetrina Dinamica (Showcase) */
        .showcase__group {
            margin-bottom: 40px;
            background: #ffffff;
            padding: 30px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .showcase__head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .showcase__title {
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 700;
        }

        .showcase__link {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .showcase__link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* Barra di ricerca e contenitore filtri */
        .search-filter-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 45px 14px 20px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #f8fafc;
        }

        .search-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
            background-color: #fff;
        }

        #clearSearch {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #e2e8f0;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        #clearSearch:hover {
            background: #cbd5e1;
            color: var(--text-main);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .filter-group select {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            background-color: #fff;
            cursor: pointer;
        }

        /* Intestazione risultati */
        .results-header {
            margin-bottom: 20px;
            font-size: 1rem;
            color: var(--text-muted);
        }

        /* Griglie dei libri */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .grid--showcase {
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        }

        /* Card del singolo libro */
        .book-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: #cbd5e1;
        }

        .book-card__title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .book-card__author {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .book-card__divider {
            border: 0;
            border-top: 1px solid #f1f5f9;
            margin-bottom: 15px;
        }

        .book-card__meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .chip {
            background-color: #eff6ff;
            color: #1e40af;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .book-card__year {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Evidenziatore del testo cercato */
        mark {
            background-color: #fef08a;
            color: #854d0e;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* Stato Vuoto */
        #emptyState {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px dashed var(--border);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Pulsante Carica Altri */
        #loadMoreWrap {
            text-align: center;
            margin-top: 40px;
        }

        #loadMore {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        #loadMore:hover {
            background-color: var(--primary-hover);
        }

        #lastUpdated {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 50px;
        }

        @media (max-width: 640px) {
            header { padding: 40px 20px; }
            header h1 { font-size: 2rem; }
            .search-filter-section { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Centro Lettura</h1>
            <p>Esplora e ricerca all'interno del nostro catalogo di libri</p>
        </div>
    </header>

    <main class="container">
        <section class="stats-container">
            <div class="stat-card">
                <h3 id="statBooks">0</h3>
                <p>Libri Totali</p>
            </div>
            <div class="stat-card">
                <h3 id="statAuthors">0</h3>
                <p>Autori Unici</p>
            </div>
            <div class="stat-card">
                <h3 id="statGenres">0</h3>
                <p>Generi</p>
            </div>
        </section>

        <section id="showcase"></section>

        <section id="catalogo" class="search-filter-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Cerca per titolo, autore, genere, editore...">
                <button id="clearSearch" hidden aria-label="Annulla ricerca">✕</button>
            </div>

            <div class="filters-grid">
                <div class="filter-group">
                    <label for="filterCategoria">Macro Categoria</label>
                    <select id="filterCategoria">
                        <option value="">Tutte</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filterGenere">Genere specifico</label>
                    <select id="filterGenere">
                        <option value="">Tutti</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sortBy">Ordina i risultati</label>
                    <select id="sortBy">
                        <option value="rilevanza">Rilevanza</option>
                        <option value="titolo-asc">Titolo (A-Z)</option>
                        <option value="autore-asc">Autore (A-Z)</option>
                        <option value="anno-desc">Anno (Più recente)</option>
                        <option value="anno-asc">Anno (Meno recente)</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="results-header">
            <p id="resultsCount"></p>
        </div>

        <div id="grid" class="grid"></div>

        <div id="emptyState" hidden>
            <p>Nessun libro corrisponde ai filtri o al termine di ricerca inserito.</p>
        </div>

        <div id="loadMoreWrap" hidden>
            <button id="loadMore">Carica altri libri</button>
        </div>

        <p id="lastUpdated"></p>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script src="app.js"></script>

</body>
</html>
